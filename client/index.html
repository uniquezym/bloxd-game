<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd - Multiplayer Parkour</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #game-container {
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(100, 100, 200, 0.3);
        }
        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .ui-panel .coins, .ui-panel .score {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ui-panel .coins::before {
            content: "🪙";
        }
        .ui-panel .score::before {
            content: "⭐";
        }
        #room-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            color: #fff;
            display: none;
        }
        #room-info h2 { margin-bottom: 20px; color: #7c7cff; }
        #room-info input {
            padding: 10px 15px;
            font-size: 18px;
            border: 2px solid #4a4a6a;
            border-radius: 6px;
            background: #2a2a4a;
            color: #fff;
            width: 200px;
            text-align: center;
            margin-right: 10px;
        }
        #room-info button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        #room-info .btn-primary {
            background: #7c7cff;
            color: #fff;
        }
        #room-info .btn-secondary {
            background: #4a4a6a;
            color: #fff;
        }
        #players-list {
            margin-top: 15px;
            text-align: left;
        }
        #players-list li {
            padding: 5px 0;
            color: #aaa;
        }
        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 6px;
            color: #888;
            font-size: 12px;
        }
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            z-index: 1000;
        }
        .touch-btn-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(124, 124, 255, 0.6);
            border: 3px solid rgba(124, 124, 255, 0.9);
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .touch-btn:active {
            background: rgba(124, 124, 255, 0.9);
        }
        .touch-btn.jump-btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 204, 0, 0.6);
            border-color: rgba(0, 204, 0, 0.9);
            font-size: 14px;
        }
        .touch-btn.jump-btn:active {
            background: rgba(0, 204, 0, 0.9);
        }
        @media (max-width: 768px) {
            #touch-controls { display: flex; }
            .controls-hint { display: none; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-overlay">
            <div class="ui-panel" id="player-count">Players: 0</div>
            <div class="ui-panel" id="room-code">Room: -</div>
        </div>
        <div id="room-info">
            <h2>Bloxd Multiplayer</h2>
            <div id="menu-buttons">
                <button class="btn-primary" id="btn-create">Create Room</button>
                <button class="btn-secondary" id="btn-join">Join Room</button>
            </div>
            <div id="join-form" style="display:none;">
                <input type="text" id="room-input" placeholder="Room Code" maxlength="6">
                <button class="btn-primary" id="btn-join-confirm">Join</button>
            </div>
            <div id="players-list">
                <h3 style="color:#7c7cff;margin-bottom:10px;">Players</h3>
                <ul id="players-ul"></ul>
            </div>
            <p id="error-msg" style="color:#ff6b6b;margin-top:10px;"></p>
        </div>
        <div class="controls-hint">WASD / Arrow Keys to move | Space to jump</div>
    </div>

    <script src="src/levels.js"></script>
    <script src="src/scenes/PreloadScene.js"></script>
    <script src="src/network/NetworkManager.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/LevelScene.js"></script>
    <script src="src/scenes/LobbyScene.js"></script>
    <script src="src/scenes/GameScene.js"></script>
    <script src="game.js"></script>
    <script>
        // 触摸控制
        document.addEventListener('DOMContentLoaded', function() {
            const controls = document.createElement('div');
            controls.id = 'touch-controls';
            controls.innerHTML = `
                <div class="touch-btn-group">
                    <button class="touch-btn" id="touch-left">◀</button>
                    <button class="touch-btn" id="touch-right">▶</button>
                </div>
                <div class="touch-btn-group">
                    <button class="touch-btn jump-btn" id="touch-jump">JUMP</button>
                </div>
            `;
            document.body.appendChild(controls);

            // 触摸按钮事件
            function setupTouchBtn(id, keyName) {
                const btn = document.getElementById(id);
                if (!btn) return;

                const preventDefault = (e) => e.preventDefault();
                btn.addEventListener('touchstart', preventDefault, { passive: false });
                btn.addEventListener('touchend', preventDefault, { passive: false });

                btn.addEventListener('touchstart', () => {
                    window.dispatchEvent(new CustomEvent('touch-input', { detail: { key: keyName, value: true } }));
                });
                btn.addEventListener('touchend', () => {
                    window.dispatchEvent(new CustomEvent('touch-input', { detail: { key: keyName, value: false } }));
                });
            }

            setupTouchBtn('touch-left', 'left');
            setupTouchBtn('touch-right', 'right');
            setupTouchBtn('touch-jump', 'jump');
        });
    </script>
</body>
</html>
